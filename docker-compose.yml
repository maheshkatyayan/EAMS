services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eams
      POSTGRES_PASSWORD: eams
      POSTGRES_DB: eams
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eams"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://eams:eams@db:5432/eams
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      CORS_ORIGINS: http://localhost,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
